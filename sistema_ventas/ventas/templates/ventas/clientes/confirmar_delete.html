{% extends "ventas/base.html" %}

{% block title %}Eliminar Cliente{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="alert alert-warning" role="alert">
        <h4 class="alert-heading">¿Estás seguro?</h4>
        <p>Estás a punto de eliminar el cliente: <strong>{{ cliente.nombre }}</strong></p>
        <hr>
        <p class="mb-0">Esta acción no se puede deshacer.</p>
    </div>
    
    <form method="post" class="d-inline">
        {% csrf_token %}
        <input type="hidden" name="confirmar" value="si">
        <button type="submit" class="btn btn-danger">Confirmar Eliminación</button>
        <a href="{% url 'lista_clientes' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
